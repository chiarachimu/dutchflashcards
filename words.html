<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Dutch Vocabulary — Flashcards</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius-md:8px;--radius-lg:12px;
  --purple-light:#EEEDFE;--purple-mid:#7F77DD;--purple-dark:#3C3489;--purple-border:#AFA9EC;
  --teal-light:#E1F5EE;--teal-dark:#085041;--teal-border:#5DCAA5;
  --red-light:#FCEBEB;--red-dark:#501313;--red-border:#F09595;
  --amber-light:#FAEEDA;--amber-dark:#633806;--amber-border:#EF9F27;
  --blue-light:#E6F1FB;--blue-dark:#0C447C;--blue-border:#85B7EB;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0ede8;--text2:#a09e97;--text3:#6b6a63;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --purple-light:#26215C;--purple-dark:#CECBF6;--purple-border:#534AB7;
    --teal-light:#04342C;--teal-dark:#9FE1CB;--teal-border:#0F6E56;
    --red-light:#501313;--red-dark:#F7C1C1;--red-border:#A32D2D;
    --amber-light:#412402;--amber-dark:#FAC775;--amber-border:#BA7517;
    --blue-light:#042C53;--blue-dark:#B5D4F4;--blue-border:#378ADD;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.app{max-width:680px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.mode-tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.mode-tab{flex:1;min-width:140px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;font-family:inherit}
.mode-tab.active{background:var(--blue-light);color:var(--blue-dark);border-color:transparent}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.cat-btn{padding:6px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--bg2);cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;font-family:inherit}
.cat-btn.active{background:var(--purple-light);color:var(--purple-dark);border-color:var(--purple-border)}
.cat-btn:hover:not(.active){border-color:var(--border2);color:var(--text)}
.progress-bar{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--purple-mid);border-radius:2px;transition:width .3s}
.progress-text{font-size:12px;color:var(--text3);text-align:right;margin-bottom:1.5rem}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;cursor:pointer;transition:transform .1s;position:relative}
.card:hover{transform:scale(1.003)}
.card.no-hover{cursor:default;transform:none!important;align-items:flex-start}
.card-hint{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;text-align:center}
.card-main{font-size:26px;font-weight:500;color:var(--text);text-align:center;margin-bottom:.25rem}
.card-type{font-size:11px;color:var(--text3);margin-bottom:1rem}
.card-tap{font-size:12px;color:var(--text3);margin-top:1.5rem}
.answer-block{display:none;width:100%;margin-top:1rem}
.answer-block.show{display:block}
.answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.answer-cell{background:var(--bg2);border-radius:var(--radius-md);padding:10px 14px}
.answer-cell.full{grid-column:1/-1}
.answer-cell .alabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.answer-cell .avalue{font-size:15px;font-weight:500;color:var(--text)}
.fill-form{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:1rem}
.fill-row{display:flex;flex-direction:column;gap:4px}
.fill-row label{font-size:12px;color:var(--text2)}
.fill-input{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.fill-input:focus{border-color:var(--purple-mid)}
.fill-input.correct{border-color:var(--teal-border);background:var(--teal-light);color:var(--teal-dark)}
.fill-input.wrong{border-color:var(--red-border);background:var(--red-light);color:var(--red-dark)}
.card-header{margin-bottom:1rem;width:100%}
.card-word{font-size:22px;font-weight:500;color:var(--text)}
.card-en{font-size:14px;color:var(--text2);margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.btn{padding:9px 18px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg);cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--purple-light);color:var(--purple-dark);border-color:var(--purple-border)}
.btn.primary:hover{background:var(--purple-border)}
.btn.success{background:var(--teal-light);color:var(--teal-dark);border-color:var(--teal-border)}
.btn.danger{background:var(--red-light);color:var(--red-dark);border-color:var(--red-border)}
.stats{display:flex;gap:10px;margin-top:.5rem}
.stat{flex:1;background:var(--bg2);border-radius:var(--radius-md);padding:10px;text-align:center}
.stat .n{font-size:20px;font-weight:500}
.stat .l{font-size:11px;color:var(--text2)}
.stat.correct .n{color:#1D9E75}
.stat.wrong .n{color:#E24B4A}
.empty{text-align:center;padding:3rem;color:var(--text2);font-size:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-left:6px}
.badge-noun{background:var(--blue-light);color:var(--blue-dark)}
.badge-adj{background:var(--amber-light);color:var(--amber-dark)}
.badge-adv{background:var(--teal-light);color:var(--teal-dark)}
</style>
</head>

<h1>Dutch vocabulary</h1>
<p class="subtitle">Nouns: guess meaning + de/het + plural &nbsp;·&nbsp; Adjectives & adverbs: guess meaning</p>

const CATS = Object.keys(WORDS);
let mode='meaning', activeCat=null, deck=[], idx=0, score={correct:0,wrong:0};

function buildCatGrid(){
  const g=document.getElementById('catGrid');
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn';
    const count=WORDS[c].length;
    b.textContent=c+' ('+count+')';
    b.onclick=()=>{
      document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      activeCat=c;
      startDeck();
    };
    g.appendChild(b);
  });
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.textContent.includes(m==='meaning'?'meaning':'full')));
  if(activeCat) startDeck();
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startDeck(){
  deck=shuffle(WORDS[activeCat]);
  idx=0;score={correct:0,wrong:0};
  renderCard();updateProgress();
}

function updateProgress(){
  const total=deck.length,done=score.correct+score.wrong;
  document.getElementById('progressFill').style.width=(total?done/total*100:0)+'%';
  document.getElementById('progressText').textContent=total?`${done} / ${total} done`:'—';
  const sa=document.getElementById('statsArea');
  sa.style.display=total?'flex':'none';
  sa.innerHTML=`<div class="stat correct"><div class="n">${score.correct}</div><div class="l">correct</div></div><div class="stat wrong"><div class="n">${score.wrong}</div><div class="l">to review</div></div><div class="stat"><div class="n">${total-done}</div><div class="l">remaining</div></div>`;
}

function typeLabel(w){
  if(w.t==='n') return 'noun';
  if(w.t==='adj') return 'adjective';
  return 'adverb / connector';
}

function renderCard(){
  const area=document.getElementById('cardArea');
  const acts=document.getElementById('actions');
  if(idx>=deck.length){
    area.innerHTML=`<div class="card" style="cursor:default"><div class="card-hint">session complete</div><div class="card-main">${score.correct}/${deck.length} correct</div></div>`;
    acts.style.display='flex';
    acts.innerHTML=`<button class="btn primary" onclick="startDeck()">Shuffle & restart</button>`;
    return;
  }
  const w=deck[idx];
  if(mode==='meaning') renderMeaning(w,area,acts);
  else renderFull(w,area,acts);
}

function renderMeaning(w,area,acts){
  area.innerHTML=`<div class="card" id="mainCard" onclick="revealMeaning()">
    <div class="card-hint">what does this mean?</div>
    <div class="card-main">${w.nl}</div>
    <div class="card-type">${typeLabel(w)}</div>
    <div class="answer-block" id="answerBlock">
      <div class="answer-grid">
        <div class="answer-cell full"><div class="alabel">English</div><div class="avalue">${w.en}</div></div>
        ${w.t==='n'?`<div class="answer-cell"><div class="alabel">article</div><div class="avalue">${w.art}</div></div><div class="answer-cell"><div class="alabel">plural</div><div class="avalue">${w.pl}</div></div>`:''}
      </div>
    </div>
    <div class="card-tap" id="tapHint">tap to reveal</div>
  </div>`;
  acts.style.display='none';
}

function revealMeaning(){
  const ab=document.getElementById('answerBlock');
  if(!ab||ab.classList.contains('show')) return;
  ab.classList.add('show');
  document.getElementById('tapHint').style.display='none';
  const acts=document.getElementById('actions');
  acts.style.display='flex';
  acts.innerHTML=`<button class="btn success" onclick="markM(true)">I knew it</button><button class="btn danger" onclick="markM(false)">Still learning</button>`;
}

function markM(ok){
  if(ok) score.correct++; else score.wrong++;
  idx++;updateProgress();renderCard();
}

function renderFull(w,area,acts){
  const isNoun=w.t==='n';
  let fields=`<div class="fill-row"><label>English meaning</label><input class="fill-input" id="f_en" type="text" placeholder="translation" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
  if(isNoun){
    fields+=`<div class="fill-row"><label>article (de / het)</label><input class="fill-input" id="f_art" type="text" placeholder="de or het" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
    fields+=`<div class="fill-row"><label>plural</label><input class="fill-input" id="f_pl" type="text" placeholder="plural form" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
  }
  area.innerHTML=`<div class="card no-hover">
    <div class="card-hint">fill in the details</div>
    <div class="card-header">
      <div class="card-word">${w.nl} <span class="badge badge-${w.t==='n'?'noun':w.t==='adj'?'adj':'adv'}">${typeLabel(w)}</span></div>
    </div>
    <div class="fill-form">${fields}</div>
  </div>`;
  acts.style.display='flex';
  acts.innerHTML=`<button class="btn primary" onclick="checkFull()">Check answers</button>`;
  setTimeout(()=>{const e=document.getElementById('f_en');if(e)e.focus();},50);
}

function norm(s){return s.trim().toLowerCase()}

function checkFull(){
  const w=deck[idx];
  const isNoun=w.t==='n';
  let allRight=true;

  const en=document.getElementById('f_en');
  // flexible meaning check: any word from the answer appearing in user input
  const enWords=w.en.toLowerCase().split(/[\s/,]+/).filter(x=>x.length>2);
  const enOk=enWords.some(ww=>norm(en.value).includes(ww))||norm(en.value)===norm(w.en);
  en.className='fill-input '+(enOk?'correct':'wrong');
  if(!enOk){allRight=false;en.value=en.value+' → '+w.en;}

  if(isNoun){
    const art=document.getElementById('f_art');
    const artOk=norm(art.value)===norm(w.art);
    art.className='fill-input '+(artOk?'correct':'wrong');
    if(!artOk){allRight=false;art.value=art.value+' → '+w.art;}

    const pl=document.getElementById('f_pl');
    const plOk=norm(pl.value)===norm(w.pl)||w.pl==='—';
    pl.className='fill-input '+(plOk?'correct':'wrong');
    if(!plOk){allRight=false;pl.value=pl.value+' → '+w.pl;}
  }

  if(allRight) score.correct++; else score.wrong++;
  idx++;updateProgress();
  document.getElementById('actions').innerHTML=`<button class="btn primary" onclick="renderCard()">Next →</button>`;
}

buildCatGrid();
</script>
</body>
</html>
